<link href="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
<script src="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

<!DOCTYPE html>
<html>
<head>
    <title>Chatbot</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
    <style>
        .chat { margin-top: 20px; }
        .card { height: 90vh; }
        .msg_card_body { height: 75vh; overflow-y: auto; padding: 20px; }
        .msg_cotainer, .msg_cotainer_send { max-width: 80%; padding: 10px 15px; border-radius: 10px; font-size: 1rem; line-height: 1.5; word-wrap: break-word; }
        .msg_cotainer { background-color: #f1f0f0; }
        .msg_cotainer_send { background-color: #007bff; color: white; }
        .msg_time, .msg_time_send { font-size: 0.7rem; margin-left: 10px; }
        .card-footer { height: auto; padding: 10px; }
        #text { font-size: 1rem; }
    </style>
</head>

<body>
<div class="container-fluid h-100">
    <div class="row justify-content-center h-100">
        <div class="col-md-8 col-xl-6 chat">
            <div class="card">
                <div class="card-header msg_head">
                    <div class="d-flex bd-highlight">
                        <div class="img_cont">
                            <img src="{{ url_for('static', filename='medibot.png') }}" class="rounded-circle user_img">
                            <span class="online_icon"></span>
                        </div>
                        <div class="user_info">
                            <span>Medical Chatbot</span>
                            <p>Ask me anything!</p>
                        </div>
                    </div>
                </div>
                <div id="messageFormeight" class="card-body msg_card_body"></div>
                <div class="card-footer">
                    <form id="messageArea" class="input-group">
                        <input type="text" id="text" name="msg" placeholder="Type your message..." autocomplete="off" class="form-control type_msg" required/>
                        <div class="input-group-append">
                            <button type="submit" id="send" class="input-group-text send_btn"><i class="fas fa-location-arrow"></i></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
$(document).ready(function() {
    $("#messageArea").on("submit", async function(event) {
        event.preventDefault();

        const date = new Date();
        const str_time = date.getHours() + ":" + date.getMinutes();
        const userText = $("#text").val();

        if (!userText) return;

        // Append user message
        const userHtml = `
            <div class="d-flex justify-content-end mb-4">
                <div class="msg_cotainer_send">${userText}<span class="msg_time_send">${str_time}</span></div>
                <div class="img_cont_msg">
                    <img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg">
                </div>
            </div>`;
        $("#messageFormeight").append(userHtml);
        $("#text").val("");
        $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);

        // Create separate bot message container
        const botContainerId = "bot_msg_" + Date.now();
        const botHtml = $(`
            <div class="d-flex justify-content-start mb-4">
                <div class="img_cont_msg">
                    <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg">
                </div>
                <div class="msg_cotainer" id="${botContainerId}"></div>
            </div>
        `);
        $("#messageFormeight").append(botHtml);
        const botContainer = $("#" + botContainerId);

        // Stream response from backend
        const formData = new FormData();
        formData.append("msg", userText);

        const response = await fetch("/stream", {
            method: "POST",
            body: formData,
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            botContainer.append(chunk);
            $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
        }
    });
});
</script>
</body>
</html>
